<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2D Mini GTA</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; 
        }
        #hud {
            font-size: 18px;
            margin-bottom: 10px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
            width: 90%;
            max-width: 780px;
        }
        #gameCanvas {
            background-color: #444; /* Asfalt */
            border: 3px solid #fff;
            max-width: 100%;
            max-height: 65vh;
        }
        /* Virtuální joystick */
        #joystickContainer {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 110px;
            height: 110px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #joystickStick {
            width: 45px;
            height: 45px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
        }
        /* Tlačítko Obchodu / Garáže */
        #shopButton {
            position: absolute;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            font-size: 18px;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px #e65100;
        }
        #shopButton:active {
            box-shadow: 0 1px #e65100;
            transform: translateY(3px);
        }
    </style>
</head>
<body>

    <div id="hud">
        Peníze: <strong>$<span id="money">100</span></strong> | 
        Auto: <span id="carType" style="color: #ff3333;">Červené (Pomalé)</span> <br>
        <span id="missionText" style="color: #ffff00;">Najdi zelenou telefonní budku a vezmi si misi!</span>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="joystickContainer">
        <div id="joystickStick"></div>
    </div>

    <button id="shopButton">KOUPIT SPORŤÁK ($150)</button>

    <script src="game.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }
    </script>
</body>
</html>
